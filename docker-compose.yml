version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grimoire-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Tell Next.js where the backend server is in the docker network
      - BACKEND_API_URL=http://grimoire-backend:3001
    env_file:
      - .env.local
    depends_on:
      - backend
    networks:
      - vps-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grimoire-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    networks:
      - vps-net

networks:
  vps-net:
    external: true
